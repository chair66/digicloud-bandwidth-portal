{% extends "base.html" %}{% block content %}<div class="head"><div><h1>CSR Orders</h1></div><a class="btn btn-primary" href="/csrs/new">New CSR</a></div><div class="panel"><table class="table mb-0"><thead><tr><th>Status</th><th>Order</th><th>BTN</th><th>End User</th></tr></thead><tbody>{% for c in csr_orders %}<tr><td>{{ c.status }}</td><td>{{ c.orderId }}</td><td>{{ c.accountTelephoneNumber or '—' }}</td><td>{{ c.endUserName or '—' }}</td></tr>{% else %}<tr><td colspan="4">No CSR orders.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
