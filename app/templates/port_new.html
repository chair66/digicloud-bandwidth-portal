{% extends "base.html" %}{% block content %}<div class="head"><h1>Create Port</h1></div><form method="post" class="panel p-4"><div class="row g-3"><div class="col-md-6"><input class="form-control" required name="customerOrderId" placeholder="Customer Order ID"></div><div class="col-md-6"><input class="form-control" required name="loaAuthorizingPerson" placeholder="LOA Authorizing Person"></div><div class="col-md-6"><select class="form-select" required name="subAccountId"><option value="">Sub-Account</option>{% for s in sites %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div><div class="col-md-6"><select class="form-select" required name="locationId"><option value="">Location</option>{% for s in sites %}{% for l in s.locations or [] %}<option value="{{ l.locationId }}">{{ s.name }} / {{ l.locationName }}</option>{% endfor %}{% endfor %}</select></div><div class="col-12"><textarea class="form-control" required name="phoneNumbers" rows="5" placeholder="One number per line"></textarea></div><div class="col-md-6"><input class="form-control" name="requestedFocDate" placeholder="2026-08-15T15:30:00Z"></div><div class="col-md-6"><input class="form-control" name="targetRespOrgId" placeholder="Target RespOrg ID"></div></div><button class="btn btn-primary mt-3">Submit Port</button></form>{% endblock %}
