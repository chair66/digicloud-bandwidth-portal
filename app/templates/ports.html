{% extends "base.html" %}{% block content %}<div class="head"><div><h1>Port Orders</h1></div><a class="btn btn-primary" href="/ports/new">Create Port</a></div><form class="panel p-3 mb-3"><select class="form-select" name="site_id" onchange="this.form.submit()">{% for s in sites %}<option value="{{ s.id }}" {% if s.id==selected_site_id %}selected{% endif %}>{{ s.name }}</option>{% endfor %}</select></form><div class="panel"><table class="table mb-0"><thead><tr><th>Status</th><th>Order</th><th>BTN</th><th>Carrier</th><th>Qty</th><th></th></tr></thead><tbody>{% for p in portins %}<tr><td>{{ p.processingStatus }}</td><td>{{ p.orderId }}</td><td>{{ p.billingPhoneNumber }}</td><td>{{ p.losingCarrierName }}</td><td>{{ p.countOfPhoneNumbers }}</td><td><a href="/ports/{{ p.orderId }}">Open</a></td></tr>{% else %}<tr><td colspan="6">No ports.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
