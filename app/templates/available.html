{% extends "base.html" %}{% block content %}<div class="head"><div><h1>Available Numbers</h1><p>Search Bandwidth inventory.</p></div></div><form class="panel p-3 mb-3"><div class="row g-2"><div class="col"><input class="form-control" name="areaCode" placeholder="Area code" value="{{ values.areaCode }}"></div><div class="col"><input class="form-control" name="quantity" placeholder="Quantity" value="{{ values.quantity }}"></div><div class="col"><input class="form-control" name="state" placeholder="State" value="{{ values.state }}"></div><div class="col"><input class="form-control" name="city" placeholder="City" value="{{ values.city }}"></div><div class="col"><button class="btn btn-primary">Search</button></div></div></form>{% if searched %}<div class="panel p-3">{% for b in results %}<h6>{{ b.phoneNumberType }} · {{ b.availableQuantity }}</h6><p>{{ b.phoneNumbers|join(', ') }}</p>{% else %}No results.{% endfor %}</div>{% endif %}{% endblock %}
